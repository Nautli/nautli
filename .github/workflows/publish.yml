name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC)

jobs:
  publish:
    # nautli targets macOS (launchd, osascript notifications) — test on the real platform
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # No registry-url: setup-node would write a ${NODE_AUTH_TOKEN} placeholder
      # into .npmrc, which preempts the OIDC (trusted publishing) exchange.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # OIDC publish needs npm 11.5.1+
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Tag must match package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json is $PKG_VERSION but tag is $TAG_VERSION" >&2
            exit 1
          fi

      - run: npm test

      - run: npm publish --loglevel http
